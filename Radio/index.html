<!DOCTYPE html>
<html lang="de" data-theme="dark" data-color="kosmos">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Æther Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hintergrund-Partikel -->
  <canvas id="bgCanvas"></canvas>
  <!-- Licht-Halo-Effekt -->
  <div id="lightHalo" class="light-halo"></div>

  <div class="app" id="app">

    <!-- ────── HEADER ────── -->
    <header class="header">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="7"  stroke="currentColor" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="2"  fill="currentColor"/>
          <line x1="3"  y1="16" x2="9"  y2="16" stroke="currentColor" stroke-width="1.5"/>
          <line x1="23" y1="16" x2="29" y2="16" stroke="currentColor" stroke-width="1.5"/>
          <line x1="16" y1="3"  x2="16" y2="9"  stroke="currentColor" stroke-width="1.5"/>
          <line x1="16" y1="23" x2="16" y2="29" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="logo-text">ÆTHER<span class="logo-accent">RADIO</span></span>
      </div>

      <div class="header-actions">
        <!-- Farbmodus -->
        <button class="hdr-btn color-btn" id="colorBtn" title="Farbmodus wechseln">
          <span id="colorEmoji">🌌</span>
        </button>
        <!-- Hell/Dunkel -->
        <button class="hdr-btn" id="themeBtn" title="Hell / Dunkel">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <!-- Vollbild -->
        <button class="hdr-btn" id="fullscreenBtn" title="Vollbild (F)">
          <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ────── HAUPTBEREICH ────── -->
    <div class="main-layout">

      <!-- ── PLAYER ── -->
      <section class="player-section">

        <!-- Artwork & Info -->
        <div class="now-playing" id="nowPlaying">
          <div class="artwork-wrap" id="artworkWrap">
            <div class="art-ring r1"></div>
            <div class="art-ring r2"></div>
            <div class="art-ring r3"></div>
            <div class="artwork-disc">
              <span id="artEmoji">📻</span>
            </div>
          </div>
          <div class="now-info">
            <div class="now-name"  id="nowName">Kein Sender gewählt</div>
            <div class="now-genre" id="nowGenre">—</div>
            <div class="now-status">
              <span class="status-led" id="statusLed"></span>
              <span class="status-txt" id="statusTxt">Bereit</span>
            </div>
          </div>
        </div>

        <!-- Visualizer -->
        <div class="viz-wrap">
          <canvas id="vizCanvas"></canvas>
        </div>

        <!-- Transport -->
        <div class="transport">
          <!-- Lautstärke -->
          <div class="vol-row">
            <button class="vol-btn" id="muteBtn" title="Stummschalten (M)">
              <svg id="volIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </button>
            <input type="range" class="vol-range" id="volRange" min="0" max="100" value="80">
            <span class="vol-pct" id="volPct">80%</span>
          </div>
          <!-- Buttons -->
          <div class="t-row">
            <button class="t-btn t-prev" id="prevBtn" title="Vorheriger Sender (←)">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 20L9 12l10-8v16z"/>
                <rect x="5" y="4" width="2" height="16"/>
              </svg>
            </button>
            <button class="t-btn t-play" id="playBtn" title="Play / Pause (Leertaste)">
              <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <button class="t-btn t-next" id="nextBtn" title="Nächster Sender (→)">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M5 4l10 8-10 8V4z"/>
                <rect x="17" y="4" width="2" height="16"/>
              </svg>
            </button>
          </div>
          <!-- Sender-Zähler -->
          <div class="t-counter" id="tCounter">0 Sender</div>
        </div>

      </section>

      <!-- ── SENDERLISTE ── -->
      <aside class="station-section">

        <div class="st-header">
          <h2 class="st-title">SENDER</h2>
          <div class="st-actions">
            <button class="st-act" id="exportBtn" title="Als JSON speichern">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <label class="st-act" title="JSON laden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <input type="file" id="importInput" accept=".json" hidden>
            </label>
          </div>
        </div>

        <div class="search-bar">
          <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Sender suchen...">
        </div>

        <!-- ── QUICK-ADD PANEL ── -->
        <div class="qa-wrap" id="qaWrap">
          <button class="qa-toggle" id="qaToggle" title="Neuen Sender eingeben">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5"  y1="12" x2="19" y2="12"/>
            </svg>
            <span>Neuen Sender hinzufügen</span>
            <svg class="qa-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          <div class="qa-panel" id="qaPanel">
            <div class="qa-row qa-row2">
              <div class="qa-field">
                <label class="qa-label" for="qaName">📡 Name</label>
                <input type="text" id="qaName" class="qa-input" placeholder="z.B. Radio Paradise">
              </div>
              <div class="qa-field">
                <label class="qa-label" for="qaIcon">🎨 Icon</label>
                <input type="text" id="qaIcon" class="qa-input qa-icon-in" placeholder="🎵" maxlength="4">
              </div>
            </div>
            <div class="qa-field">
              <label class="qa-label" for="qaUrl">🔗 Stream-URL <span class="qa-req">*</span></label>
              <input type="url" id="qaUrl" class="qa-input" placeholder="https://stream.example.com/live.mp3">
            </div>
            <div class="qa-field">
              <label class="qa-label" for="qaGenre">🎼 Genre</label>
              <input type="text" id="qaGenre" class="qa-input" placeholder="z.B. Jazz · Rock · News · Ambient …">
            </div>
            <div class="qa-foot">
              <button class="qa-clear" id="qaClear">Zurücksetzen</button>
              <button class="qa-save"  id="qaSave">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                Sender speichern
              </button>
            </div>
          </div>
        </div>

        <div class="station-list" id="stationList"></div>

      </aside>

    </div><!-- /main-layout -->
  </div><!-- /app -->

  <!-- ────── MODAL: Sender hinzufügen ────── -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-head">
        <h3>Sender hinzufügen</h3>
        <button class="modal-x" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <label class="mfield">
          <span>Name</span>
          <input type="text" id="mName" placeholder="z.B. BBC World Service">
        </label>
        <label class="mfield">
          <span>Stream-URL</span>
          <input type="url" id="mUrl" placeholder="https://stream.example.com/live.mp3">
        </label>
        <label class="mfield">
          <span>Genre</span>
          <input type="text" id="mGenre" placeholder="z.B. Jazz, News, Techno …">
        </label>
        <label class="mfield">
          <span>Emoji-Icon</span>
          <input type="text" id="mIcon" placeholder="🎵" maxlength="4">
        </label>
      </div>
      <div class="modal-foot">
        <button class="m-btn m-cancel" id="mCancel">Abbrechen</button>
        <button class="m-btn m-ok"     id="mOk">Hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- Toast-Benachrichtigung -->
  <div class="toast" id="toast"></div>

  <audio id="audioEl" crossorigin="anonymous" preload="none"></audio>
  <script src="script.js"></script>
</body>
</html>
